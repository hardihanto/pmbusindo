<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- SEO Dasar -->
  <title>PMB USINDO 2026/2027 - Pendaftaran Mahasiswa Baru Universitas Sehati Indonesia</title>
  <meta name="description" content="Pendaftaran Mahasiswa Baru (PMB) Universitas Sehati Indonesia (USINDO) Tahun Akademik 2026/2027. Lulusan USINDO Siap Kerja. Tersedia berbagai beasiswa menarik! Daftar sekarang.">
  <meta name="keywords" content="PMB USINDO, Universitas Sehati Indonesia, Pendaftaran Mahasiswa Baru 2026, Kuliah di Karawang, Kampus Karawang, Beasiswa Kuliah, S1 Teknik Informatika, S1 Ilmu Kesehatan Masyarakat, Ilmu Hukum, Pendaftaran Kuliah Online">
  <meta name="author" content="Universitas Sehati Indonesia (USINDO)">
  <meta name="robots" content="index, follow">
  <meta name="language" content="Indonesian">
  
  <!-- Open Graph / Facebook / WhatsApp -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.usindo.ac.id/">
  <meta property="og:title" content="PMB USINDO 2026/2027 - Pendaftaran Mahasiswa Baru">
  <meta property="og:description" content="Pendaftaran Mahasiswa Baru Universitas Sehati Indonesia (USINDO) 2026/2027. Tersedia Fakultas Ilmu Kesehatan, Hukum & Ilmu Sosial, dan Teknik.">
  <meta property="og:image" content="https://assyifateknologinusantara.com/wp-content/uploads/2026/05/usindo.jpeg">

  <!-- Twitter Card -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://www.usindo.ac.id/">
  <meta property="twitter:title" content="PMB USINDO 2026/2027 - Universitas Sehati Indonesia">
  <meta property="twitter:description" content="Kuliah? Usindo Aja! Pendaftaran Mahasiswa Baru (PMB) Universitas Sehati Indonesia (USINDO) Tahun Akademik 2026/2027.">
  <meta property="twitter:image" content="https://assyifateknologinusantara.com/wp-content/uploads/2026/05/usindo.jpeg">
  
  <!-- Favicon / Ikon Website -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><path fill='%23b91c1c' d='M256 48l256 120-256 120L0 168 256 48zm0 288l-152-71.3V384c0 35.3 68.1 64 152 64s152-28.7 152-64V264.7L256 336z'/></svg>" type="image/svg+xml">
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons via CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- HTML2PDF via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- React & ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel standalone via CDN -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==============================================================================
    // KONFIGURASI BIAYA PRODI (Bisa diedit angkanya menyesuaikan yang ada di brosur)
    // ==============================================================================
    const BIAYA_PRODI = {
      "S1 Ilmu Kesehatan Masyarakat": "Rp 3.500.000",
      "D3 Kebidanan": "Rp 4.000.000",
      "D3 Keperawatan": "Rp 4.000.000",
      "S1 Ilmu Hukum": "Rp 2.000.000",
      "S1 Manajemen": "Rp 2.000.000",
      "S1 Psikologi": "Rp 2.000.000",
      "S1 PGSD": "Rp 2.000.000",
      "S1 Rekayasa Industri": "Rp 2.000.000",
      "S1 Teknik Informatika": "Rp 2.000.000"
    };

    // Main Application Component
    function App() {
      const [currentView, setCurrentView] = useState('landing');
      const [isPdfReady, setIsPdfReady] = useState(false);
      const [db, setDb] = useState([]);
      const [currentUser, setCurrentUser] = useState(null); 
      const [loggedInStudent, setLoggedInStudent] = useState(null); 
      const [toast, setToast] = useState({ visible: false, message: '', type: 'info' });
      const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);

      const showToast = (message, type = 'info') => {
        setToast({ visible: true, message, type });
        setTimeout(() => setToast({ visible: false, message: '', type: 'info' }), 3000);
      };

      // Load Database from LocalStorage on mount
      useEffect(() => {
        const savedData = localStorage.getItem('pmb_database');
        if (savedData) {
          setDb(JSON.parse(savedData));
        }
        
        if (window.html2pdf) {
            setIsPdfReady(true);
        } else {
            setTimeout(() => setIsPdfReady(true), 1500); 
        }
      }, []);

      const saveToDb = (formData) => {
        const newUser = { ...formData, id: Date.now(), tanggalDaftar: new Date().toLocaleDateString('id-ID'), statusPembayaran: 'Belum Bayar' };
        const newDb = [...db, newUser];
        setDb(newDb);
        localStorage.setItem('pmb_database', JSON.stringify(newDb));
        setCurrentUser(newUser);
        setLoggedInStudent(newUser); 
        setCurrentView('success');
        showToast('Data Pendaftaran Berhasil Disimpan!', 'success');
        window.scrollTo(0, 0);
      };

      const handleStudentLogin = (user) => {
        setLoggedInStudent(user);
        setCurrentView('student-dashboard');
        showToast('Berhasil Login Calon Mahasiswa!', 'success');
        window.scrollTo(0, 0);
      };

      // Fungsi konfirmasi pembayaran oleh Admin
      const handleConfirmPayment = (userId) => {
        if(window.confirm('Anda yakin ingin mengonfirmasi pembayaran untuk pendaftar ini?')) {
           const updatedDb = db.map(user => 
             user.id === userId ? { ...user, statusPembayaran: 'Dikonfirmasi', tanggalDikonfirmasi: new Date().toLocaleDateString('id-ID') } : user
           );
           setDb(updatedDb);
           localStorage.setItem('pmb_database', JSON.stringify(updatedDb));
           showToast('Pembayaran berhasil dikonfirmasi!', 'success');
        }
      };

      // Fungsi hapus data maba oleh Admin
      const handleDeleteUser = (userId) => {
        if(window.confirm('PERINGATAN! Anda yakin ingin menghapus data calon mahasiswa ini secara permanen?')) {
          const updatedDb = db.filter(user => user.id !== userId);
          setDb(updatedDb);
          localStorage.setItem('pmb_database', JSON.stringify(updatedDb));
          showToast('Data calon mahasiswa berhasil dihapus.', 'success');
        }
      };

      // Fungsi update data maba oleh Admin (Edit)
      const handleUpdateUser = (updatedUserData) => {
        const updatedDb = db.map(user => 
          user.id === updatedUserData.id ? updatedUserData : user
        );
        setDb(updatedDb);
        localStorage.setItem('pmb_database', JSON.stringify(updatedDb));
        showToast('Data calon mahasiswa berhasil diperbarui!', 'success');
      };

      return (
        <div className="min-h-screen flex flex-col relative overflow-x-hidden">
          {/* Toast Notification */}
          <div className={`fixed top-20 right-4 z-50 transition-all duration-300 transform ${toast.visible ? 'translate-y-0 opacity-100' : '-translate-y-4 opacity-0 pointer-events-none'}`}>
            <div className={`flex items-center gap-3 px-4 py-3 rounded-lg shadow-xl text-white border ${toast.type === 'success' ? 'bg-green-600 border-green-700' : toast.type === 'error' ? 'bg-red-600 border-red-700' : 'bg-blue-600 border-blue-700'}`}>
              {toast.type === 'success' ? <i className="fa-solid fa-circle-check text-xl"></i> : <i className="fa-solid fa-circle-info text-xl"></i>}
              <span className="font-medium text-sm md:text-base">{toast.message}</span>
              <button onClick={() => setToast({ ...toast, visible: false })} className="ml-2 text-white/80 hover:text-white transition">
                <i className="fa-solid fa-xmark text-lg"></i>
              </button>
            </div>
          </div>

          {/* FOMO Notification */}
          <FomoNotification db={db} />

          {/* Navigation Bar */}
          <nav className="bg-red-700 text-white shadow-md sticky top-0 z-10 border-b-4 border-yellow-400">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16 items-center overflow-x-auto no-scrollbar">
                <div 
                  className="flex items-center gap-2 cursor-pointer flex-shrink-0 mr-4" 
                  onClick={() => {setCurrentView('landing'); window.scrollTo(0,0);}}
                >
                  <i className="fa-solid fa-graduation-cap text-yellow-400 text-3xl"></i>
                  <span className="font-bold text-lg md:text-xl tracking-tight">PMB USINDO</span>
                </div>
                <div className="flex gap-1 md:gap-2 flex-shrink-0">
                  <button 
                    onClick={() => {setCurrentView('landing'); window.scrollTo(0,0);}}
                    className={`flex items-center gap-1 px-3 py-2 rounded-md transition-colors text-sm md:text-base ${currentView === 'landing' ? 'bg-red-900' : 'hover:bg-red-800'}`}
                  >
                    <i className="fa-solid fa-house"></i> <span className="hidden lg:inline">Beranda</span>
                  </button>
                  <button 
                    onClick={() => {setCurrentView('form'); window.scrollTo(0,0);}}
                    className={`flex items-center gap-1 px-3 py-2 rounded-md transition-colors text-sm md:text-base ${currentView === 'form' ? 'bg-red-900' : 'hover:bg-red-800'}`}
                  >
                    <i className="fa-solid fa-user-plus"></i> <span className="hidden lg:inline">Daftar</span>
                  </button>
                  
                  {/* Menu Login/Dashboard Mahasiswa */}
                  <button 
                    onClick={() => {setCurrentView(loggedInStudent ? 'student-dashboard' : 'student-login'); window.scrollTo(0,0);}}
                    className={`flex items-center gap-1 px-3 py-2 rounded-md transition-colors text-sm md:text-base ${(currentView === 'student-login' || currentView === 'student-dashboard') ? 'bg-yellow-500 text-red-900 font-bold' : 'bg-yellow-400 hover:bg-yellow-500 text-red-900 font-bold'}`}
                  >
                    <i className="fa-solid fa-user-graduate"></i> <span className="hidden sm:inline">{loggedInStudent ? 'Dashboard Maba' : 'Login Maba'}</span>
                  </button>

                  <button 
                    onClick={() => {setCurrentView('admin'); window.scrollTo(0,0);}}
                    className={`flex items-center gap-1 px-3 py-2 rounded-md transition-colors text-sm md:text-base ${currentView === 'admin' ? 'bg-red-900' : 'hover:bg-red-800'}`}
                  >
                    <i className="fa-solid fa-database"></i> <span className="hidden lg:inline">Admin</span>
                  </button>
                </div>
              </div>
            </div>
          </nav>

          {/* Main Content Area */}
          <main className="flex-grow flex flex-col">
            {currentView === 'landing' && <LandingPage setView={setCurrentView} />}
            {currentView === 'form' && <RegistrationForm submitForm={saveToDb} />}
            {currentView === 'success' && <SuccessPage user={currentUser} isPdfReady={isPdfReady} showToast={showToast} setView={setCurrentView} />}
            
            {/* Student Login & Dashboard Route */}
            {currentView === 'student-login' && <StudentLogin db={db} onLogin={handleStudentLogin} showToast={showToast} />}
            {currentView === 'student-dashboard' && <StudentDashboard student={db.find(u => u.id === loggedInStudent?.id) || loggedInStudent} BIAYA_PRODI={BIAYA_PRODI} isPdfReady={isPdfReady} showToast={showToast} onLogout={() => { setLoggedInStudent(null); setCurrentView('landing'); showToast('Berhasil Keluar', 'info'); }} />}

            {/* Admin Route */}
            {currentView === 'admin' && (
              !isAdminLoggedIn ? (
                 <AdminLogin onLogin={() => setIsAdminLoggedIn(true)} showToast={showToast} />
              ) : (
                 <AdminDashboard 
                    db={db} 
                    isPdfReady={isPdfReady} 
                    showToast={showToast} 
                    onLogout={() => setIsAdminLoggedIn(false)} 
                    onConfirmPayment={handleConfirmPayment} 
                    onDeleteUser={handleDeleteUser}
                    onUpdateUser={handleUpdateUser}
                    BIAYA_PRODI={BIAYA_PRODI} 
                 />
              )
            )}
          </main>

          {/* Footer */}
          <footer className="bg-slate-900 text-slate-300 py-10 border-t-4 border-yellow-400">
            <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 text-sm">
              <div>
                <h3 className="text-yellow-400 font-bold text-lg mb-4">Informasi & Pendaftaran</h3>
                <p className="flex items-center gap-2 mb-2"><i className="fa-solid fa-phone text-red-400 w-4"></i> Hubungi WhatsApp: <span className="font-bold text-white text-base">081929009212</span></p>
                <p className="flex items-center gap-2 mb-2"><i className="fa-solid fa-globe text-red-400 w-4"></i> www.usindo.ac.id</p>
                <p className="flex items-center gap-2 mb-2"><i className="fa-brands fa-instagram text-red-400 w-4 text-base"></i> @usindo.id</p>
                <p className="flex items-center gap-2"><i className="fa-brands fa-facebook text-red-400 w-4 text-base"></i> Universitas Sehati Indonesia</p>
              </div>
              <div>
                <h3 className="text-yellow-400 font-bold text-lg mb-4">Lokasi Kampus</h3>
                <div className="mb-4">
                  <p className="font-bold text-white flex items-center gap-2"><i className="fa-solid fa-location-dot text-red-400 w-4"></i> Kampus 1 USINDO</p>
                  <p className="text-slate-400 pl-6 leading-tight mt-1">Jl. Raya Kosambi - Telagasari Dusun Kawali,<br/>Pancawati, Kec. Klari, Karawang</p>
                </div>
                <div>
                  <p className="font-bold text-white flex items-center gap-2"><i className="fa-solid fa-location-dot text-red-400 w-4"></i> Kampus 2 USINDO</p>
                  <p className="text-slate-400 pl-6 leading-tight mt-1">Jl Raya Pangkal Perjuangan By Pass Karawang<br/>(200 Meter Dari SMKN 1 Karawang)</p>
                </div>
              </div>
              <div className="text-center md:text-right flex flex-col justify-center items-center md:items-end">
                <p className="mb-2">© 2026 Universitas Sehati Indonesia.</p>
                <div className="inline-block mt-2 p-4 border border-slate-700 rounded-lg bg-slate-800 text-center">
                  <p className="text-sm text-slate-400">Mengetahui,</p>
                  <p className="font-bold text-white text-lg mt-1">Hardi Hanto</p>
                  <p className="text-sm text-yellow-400">Panitia PMB</p>
                </div>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // --- STUDENT COMPONENTS ---
    function StudentLogin({ db, onLogin, showToast }) {
      const [nik, setNik] = useState('');
      const [tanggalLahir, setTanggalLahir] = useState('');
      
      const [captcha, setCaptcha] = useState({ n1: Math.floor(Math.random()*10)+1, n2: Math.floor(Math.random()*10)+1 });
      const [captchaInput, setCaptchaInput] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();

        if (parseInt(captchaInput) !== (captcha.n1 + captcha.n2)) {
          showToast('Verifikasi keamanan salah! Anda terdeteksi sebagai bot.', 'error');
          setCaptcha({ n1: Math.floor(Math.random()*10)+1, n2: Math.floor(Math.random()*10)+1 });
          setCaptchaInput('');
          return;
        }

        const foundStudent = db.find(user => user.nik === nik && user.tanggalLahir === tanggalLahir);
        
        if (foundStudent) {
          onLogin(foundStudent);
        } else {
          showToast('Data tidak ditemukan. Pastikan NIK dan Tanggal Lahir sesuai saat pendaftaran!', 'error');
          setCaptcha({ n1: Math.floor(Math.random()*10)+1, n2: Math.floor(Math.random()*10)+1 });
          setCaptchaInput('');
        }
      };

      return (
        <div className="flex-grow flex items-center justify-center p-6 bg-slate-100">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-8 border-yellow-400">
            <div className="flex flex-col items-center mb-8 text-center">
              <div className="bg-yellow-100 p-4 rounded-full mb-4">
                <i className="fa-solid fa-user-graduate text-yellow-600 text-4xl"></i>
              </div>
              <h2 className="text-2xl font-bold text-slate-800">Login Calon Mahasiswa</h2>
              <p className="text-slate-500 text-sm mt-2">Masuk untuk melihat instruksi pembayaran formulir pendaftaran.</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">NIK (Sesuai KTP/KK)</label>
                <input 
                  required 
                  type="number" 
                  value={nik} 
                  onChange={(e) => setNik(e.target.value)} 
                  className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none" 
                  placeholder="Masukkan 16 Digit NIK" 
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Tanggal Lahir</label>
                <input 
                  required 
                  type="date" 
                  value={tanggalLahir} 
                  onChange={(e) => setTanggalLahir(e.target.value)} 
                  className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none" 
                />
              </div>
              
              <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                <label className="block text-sm font-semibold text-slate-700 mb-2 flex items-center gap-2">
                  <i className="fa-solid fa-shield-halved text-green-600"></i> Verifikasi Keamanan
                </label>
                <div className="flex items-center gap-3">
                  <div className="bg-white px-4 py-2 border border-slate-300 rounded-lg font-bold text-slate-800 tracking-wider shadow-sm select-none">
                    {captcha.n1} + {captcha.n2} = ?
                  </div>
                  <input 
                    required 
                    type="number" 
                    value={captchaInput} 
                    onChange={(e) => setCaptchaInput(e.target.value)} 
                    className="flex-grow p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-yellow-500 outline-none" 
                    placeholder="Hasil" 
                  />
                </div>
              </div>

              <button 
                type="submit" 
                className="w-full bg-yellow-400 hover:bg-yellow-500 text-red-900 font-bold py-3 px-4 rounded-lg shadow-md transition duration-200 text-lg mt-2"
              >
                Masuk Dashboard
              </button>
            </form>
          </div>
        </div>
      );
    }

    function StudentDashboard({ student, onLogout, BIAYA_PRODI, isPdfReady, showToast }) {
      const [isGeneratingForm, setIsGeneratingForm] = useState(false);
      const [isGeneratingInvoice, setIsGeneratingInvoice] = useState(false);

      if (!student) return null;

      const isConfirmed = student.statusPembayaran === 'Dikonfirmasi';
      const biayaTertagih = BIAYA_PRODI[student.programStudi] || "Rp -";

      const waNumber = "6281929009212";
      const waMessage = `Halo Panitia PMB USINDO. Saya ingin mengonfirmasi pembayaran biaya pendaftaran untuk Program Studi ${student.programStudi}.\n\nBerikut format lampiran bukti transfer saya:\n${student.nama}_[ISI TANGGAL TRANSFER]_[ISI NOMINAL]\n\nMohon untuk divalidasi. Terima kasih.`;
      const waLink = `https://api.whatsapp.com/send?phone=${waNumber}&text=${encodeURIComponent(waMessage)}`;

      const copyRekening = () => {
        navigator.clipboard.writeText("1754519044").then(() => {
          alert("Nomor rekening berhasil disalin!");
        });
      };

      // KONFIGURASI PDF A4 (Margin 2cm Flat) TANPA TERPOTONG
      const pdfOptionsA4Portrait = (filename) => ({
        margin:       2, 
        filename:     filename,
        image:        { type: 'jpeg', quality: 1 },
        html2canvas:  { scale: 2, useCORS: true, logging: false },
        jsPDF:        { unit: 'cm', format: 'a4', orientation: 'portrait' }
      });

      const downloadFormulir = () => {
        if (!isPdfReady || !window.html2pdf) {
          alert("Sistem PDF masih memuat, silakan coba beberapa saat lagi."); return;
        }
        setIsGeneratingForm(true);
        showToast('Memproses PDF Formulir...', 'info');
        const element = document.getElementById('pdf-formulir-template-dashboard');
        
        window.html2pdf().set(pdfOptionsA4Portrait(`Formulir_PMB_${student.nama.replace(/\s+/g, '_')}.pdf`)).from(element).save().then(() => {
          setIsGeneratingForm(false);
          showToast('Formulir PDF berhasil diunduh!', 'success');
        });
      };

      const downloadInvoice = () => {
        if (!isPdfReady || !window.html2pdf) {
          alert("Sistem PDF masih memuat, silakan coba beberapa saat lagi."); return;
        }
        setIsGeneratingInvoice(true);
        showToast('Memproses PDF Invoice...', 'info');
        const element = document.getElementById('pdf-invoice-template');

        window.html2pdf().set(pdfOptionsA4Portrait(`Invoice_PMB_${student.nama.replace(/\s+/g, '_')}.pdf`)).from(element).save().then(() => {
          setIsGeneratingInvoice(false);
          showToast('Invoice PDF berhasil diunduh!', 'success');
        });
      };

      return (
        <div className="max-w-4xl mx-auto w-full p-4 sm:p-6 lg:p-8 my-4 relative">
          <div className="flex justify-between items-center mb-6">
             <h2 className="text-2xl font-bold text-red-800">Dashboard Calon Mahasiswa</h2>
             <button onClick={onLogout} className="text-slate-500 hover:text-red-600 font-semibold flex items-center gap-2 transition">
               <i className="fa-solid fa-right-from-bracket"></i> Keluar
             </button>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="md:col-span-1 bg-white rounded-2xl shadow-md border border-slate-200 p-6 flex flex-col">
               <div className="text-center mb-4 border-b pb-4">
                 <div className="w-20 h-20 bg-slate-200 rounded-full mx-auto mb-3 flex items-center justify-center text-slate-400 text-3xl">
                   <i className="fa-solid fa-user"></i>
                 </div>
                 <h3 className="font-bold text-lg text-slate-800 uppercase">{student.nama}</h3>
                 <span className={`inline-block text-xs font-bold px-2 py-1.5 rounded border mt-1 ${isConfirmed ? 'bg-green-100 text-green-800 border-green-200' : 'bg-yellow-100 text-yellow-800 border-yellow-200'}`}>
                   {isConfirmed ? 'Pembayaran Lunas' : 'Menunggu Pembayaran'}
                 </span>
               </div>
               <div className="text-sm space-y-3 text-slate-600 flex-grow">
                 <p><span className="block text-xs text-slate-400 font-medium">No. Registrasi:</span> <strong className="text-slate-800">PMB-{student.id}</strong></p>
                 <p><span className="block text-xs text-slate-400 font-medium">Program Studi:</span> <strong className="text-slate-800">{student.programStudi}</strong></p>
                 <p><span className="block text-xs text-slate-400 font-medium">No. HP / WA:</span> <strong className="text-slate-800">{student.noHp}</strong></p>
                 {!isConfirmed && (
                   <div className="mt-4 p-3 bg-red-50 border border-red-100 rounded-lg">
                      <span className="block text-xs text-slate-500 font-medium mb-1">Tagihan Biaya Awal:</span>
                      <strong className="text-xl text-red-700 block">{biayaTertagih}</strong>
                   </div>
                 )}
               </div>
               <div className="mt-6 pt-4 border-t border-slate-100">
                 <p className="text-xs text-slate-500 text-center mb-2">Lupa unduh formulir?</p>
                 <button 
                   onClick={downloadFormulir}

    function AdminLogin({ onLogin, showToast }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [captcha, setCaptcha] = useState({ n1: Math.floor(Math.random()*10)+1, n2: Math.floor(Math.random()*10)+1 });
      const [captchaInput, setCaptchaInput] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (parseInt(captchaInput) !== (captcha.n1 + captcha.n2)) {
          showToast('Verifikasi keamanan salah!', 'error');
          setCaptcha({ n1: Math.floor(Math.random()*10)+1, n2: Math.floor(Math.random()*10)+1 });
          setCaptchaInput('');
          return;
        }

        if (username === 'Admin!' && password === '@PMB#Usindo#1!') {
          onLogin();
          showToast('Login berhasil.', 'success');
        } else {
          showToast('Username atau password salah!', 'error');
          setCaptcha({ n1: Math.floor(Math.random()*10)+1, n2: Math.floor(Math.random()*10)+1 });
          setCaptchaInput('');
        }
      };

      return (
        <div className="flex-grow flex items-center justify-center p-6 bg-slate-100">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-8 border-red-700">
            <div className="flex flex-col items-center mb-8">
              <div className="bg-red-100 p-4 rounded-full mb-4">
                <i className="fa-solid fa-lock text-red-700 text-4xl"></i>
              </div>
              <h2 className="text-2xl font-bold text-slate-800">Login Administrator</h2>
            </div>
            <form onSubmit={handleSubmit} className="space-y-5">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Username</label>
                <input required type="text" value={username} onChange={(e) => setUsername(e.target.value)} className="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-red-500" />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input required type="password" value={password} onChange={(e) => setPassword(e.target.value)} className="w-full p-3 border border-slate-300 rounded-lg outline-none focus:ring-2 focus:ring-red-500" />
              </div>
              <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                <label className="block text-sm font-semibold text-slate-700 mb-2">Verifikasi Keamanan</label>
                <div className="flex items-center gap-3">
                  <div className="bg-white px-4 py-2 border rounded-lg font-bold shadow-sm">{captcha.n1} + {captcha.n2} = ?</div>
                  <input required type="number" value={captchaInput} onChange={(e) => setCaptchaInput(e.target.value)} className="flex-grow p-2.5 border rounded-lg outline-none focus:ring-2 focus:ring-red-500" />
                </div>
              </div>
              <button type="submit" className="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-3 px-4 rounded-lg shadow-md mt-2">Masuk</button>
            </form>
          </div>
        </div>
      );
    }

                  <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                     <div><label className="block text-xs font-medium text-slate-600 mb-1">Nama Lengkap</label><input required type="text" value={editingUser.nama} onChange={(e) => setEditingUser({...editingUser, nama: e.target.value})} className="w-full p-2 border rounded focus:ring-2 outline-none text-sm" /></div>
                     <div><label className="block text-xs font-medium text-slate-600 mb-1">NIK</label><input required type="number" value={editingUser.nik} onChange={(e) => setEditingUser({...editingUser, nik: e.target.value})} className="w-full p-2 border rounded focus:ring-2 outline-none text-sm" /></div>
                     <div><label className="block text-xs font-medium text-slate-600 mb-1">NISN</label><input required type="number" value={editingUser.nisn} onChange={(e) => setEditingUser({...editingUser, nisn: e.target.value})} className="w-full p-2 border rounded focus:ring-2 outline-none text-sm" /></div>
                     <div><label className="block text-xs font-medium text-slate-600 mb-1">No HP</label><input required type="tel" value={editingUser.noHp} onChange={(e) => setEditingUser({...editingUser, noHp: e.target.value})} className="w-full p-2 border rounded focus:ring-2 outline-none text-sm" /></div>
                     <div>
                       <label className="block text-xs font-medium text-slate-600 mb-1">Pilihan Program Studi</label>
                       <select value={editingUser.programStudi} onChange={(e) => setEditingUser({...editingUser, programStudi: e.target.value})} className="w-full p-2 border rounded focus:ring-2 outline-none text-sm bg-white">
                          <optgroup label="Fakultas Ilmu Kesehatan"><option value="S1 Ilmu Kesehatan Masyarakat">S1 Ilmu Kesehatan Masyarakat</option><option value="D3 Kebidanan">D3 Kebidanan</option><option value="D3 Keperawatan">D3 Keperawatan</option></optgroup>
                          <optgroup label="Fakultas Hukum & Ilmu Sosial"><option value="S1 Ilmu Hukum">S1 Ilmu Hukum</option><option value="S1 Manajemen">S1 Manajemen</option><option value="S1 Psikologi">S1 Psikologi</option><option value="S1 PGSD">S1 PGSD</option></optgroup>
                          <optgroup label="Fakultas Teknik"><option value="S1 Rekayasa Industri">S1 Rekayasa Industri</option><option value="S1 Teknik Informatika">S1 Teknik Informatika</option></optgroup>
                       </select>
                     </div>
                  </div>
                  <div className="mt-6 pt-4 border-t flex justify-end gap-3 sticky bottom-0 bg-white">
                     <button type="button" onClick={() => setEditingUser(null)} className="px-4 py-2 bg-slate-200 text-slate-700 rounded shadow text-sm font-bold">Batal</button>
                     <button type="submit" className="px-4 py-2 bg-blue-600 text-white rounded shadow text-sm font-bold">Simpan</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <div className="bg-white rounded-2xl shadow-lg border border-slate-100 overflow-hidden">
            <div className="p-6 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50">
              <div>
                <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                  <i className="fa-solid fa-users text-blue-600 text-xl"></i> Database Pendaftar
                </h2>
                <p className="text-slate-500 text-sm mt-1">Total Pendaftar: {db.length} Mahasiswa</p>
              </div>
              <div className="flex gap-2 w-full sm:w-auto">
                <button onClick={exportDatabasePDF} disabled={!isPdfReady || db.length === 0 || isExporting} className={`flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 rounded-lg font-semibold transition ${db.length === 0 ? 'bg-slate-200 text-slate-400' : 'bg-green-600 hover:bg-green-700 text-white shadow'}`}>
                  {isExporting ? <><i className="fa-solid fa-spinner fa-spin text-lg"></i> Mengekspor...</> : <><i className="fa-solid fa-download text-lg"></i> Export PDF</>}
                </button>
                <button onClick={() => {onLogout(); showToast('Berhasil logout dari Admin.', 'info');}} className="flex-1 sm:flex-none flex items-center justify-center gap-2 px-4 py-2 rounded-lg font-semibold bg-slate-200 hover:bg-slate-300 text-slate-700 transition">
                  <i className="fa-solid fa-right-from-bracket text-lg"></i> Keluar
                </button>
              </div>
            </div>

            <div className="overflow-x-auto p-4">
              <table className="w-full text-sm text-left text-slate-600">
                <thead className="text-xs text-slate-700 uppercase bg-slate-100">
                  <tr>
                    <th className="px-3 py-3">No. Reg</th>
                    <th className="px-3 py-3">Nama</th>
                    <th className="px-3 py-3">Program Studi</th>
                    <th className="px-3 py-3">No. HP</th>
                    <th className="px-3 py-3">Tgl Daftar</th>
                    <th className="px-3 py-3 text-center">Status</th>
                    <th className="px-3 py-3 text-center">Aksi</th>
                  </tr>
                </thead>
                <tbody>
                  {db.length > 0 ? (
                    db.map((user) => {
                      const isConfirmed = user.statusPembayaran === 'Dikonfirmasi';
                      return (
                        <tr key={user.id} className="border-b hover:bg-slate-50">
                          <td className="px-3 py-3 font-mono text-xs font-semibold">PMB-{user.id.toString().slice(-6)}</td>
                          <td className="px-3 py-3 font-medium text-slate-900">{user.nama}</td>
                          <td className="px-3 py-3">{user.programStudi}</td>
                          <td className="px-3 py-3">{user.noHp}</td>
                          <td className="px-3 py-3">{user.tanggalDaftar}</td>
                          <td className="px-3 py-3 text-center">
                            <span className={`px-2 py-1 rounded text-xs font-bold border ${isConfirmed ? 'bg-green-100 text-green-700 border-green-200' : 'bg-yellow-100 text-yellow-700 border-yellow-200'}`}>
                              {isConfirmed ? 'Lunas' : (user.statusPembayaran || 'Belum Bayar')}
                            </span>
                          </td>
                          <td className="px-3 py-3">
                             <div className="flex flex-wrap items-center justify-center gap-1.5">
                               {!isConfirmed && (
                                 <>
                                   <button onClick={() => handleFollowUpWA(user)} className="bg-green-500 hover:bg-green-600 text-white text-[10px] px-2 py-1.5 rounded" title="Follow Up WA"><i className="fa-brands fa-whatsapp"></i> WA</button>
                                   <button onClick={() => onConfirmPayment(user.id)} className="bg-blue-600 hover:bg-blue-700 text-white text-[10px] px-2 py-1.5 rounded" title="Konfirmasi Lunas"><i className="fa-solid fa-check"></i> Lunas</button>
                                 </>
                               )}
                               <button onClick={() => setEditingUser(user)} className="bg-orange-500 hover:bg-orange-600 text-white text-[10px] px-2 py-1.5 rounded"><i className="fa-solid fa-pen"></i> Edit</button>
                               <button onClick={() => onDeleteUser(user.id)} className="bg-red-600 hover:bg-red-700 text-white text-[10px] px-2 py-1.5 rounded"><i className="fa-solid fa-trash"></i></button>
                             </div>
                          </td>
                        </tr>
                      );
                    })
                  ) : (
                    <tr><td colSpan="7" className="px-4 py-8 text-center text-slate-500">Belum ada data pendaftar.</td></tr>
                  )}
                </tbody>
              </table>
            </div>
          </div>

          {/* PERBAIKAN MUTLAK: Container diletakkan jauh dari viewport (-9999px) tanpa batasan width dari layar HP */}
          <div style={{ position: 'absolute', top: '-9999px', left: '-9999px', zIndex: -9999 }}>
            
            {/* Laporan Admin Lanskap (Lebar A4 Lanskap 1120px) */}
            <div id="pdf-database-template" style={{ width: '1120px', backgroundColor: 'white', padding: '20px', color: 'black' }} className="font-sans text-left">
              <div className="text-center mb-8">
                <h1 className="text-2xl font-bold uppercase text-red-800">Laporan Database Pendaftaran Mahasiswa Baru</h1>
                <p className="text-lg font-bold">UNIVERSITAS SEHATI INDONESIA (USINDO)</p>
                <p className="text-md">Tahun Akademik 2026/2027</p>
                <p className="text-sm mt-2">Diekspor pada: {new Date().toLocaleString('id-ID')}</p>
              </div>

              <table className="w-full text-xs text-left border-collapse border border-slate-400">
                <thead>
                  <tr className="bg-slate-200">
                    <th className="border border-slate-400 p-2 text-center w-8">No</th>
                    <th className="border border-slate-400 p-2">No. Registrasi</th>
                    <th className="border border-slate-400 p-2">Nama Lengkap</th>
                    <th className="border border-slate-400 p-2">NISN / NIK</th>
                    <th className="border border-slate-400 p-2">Program Studi</th>
                    <th className="border border-slate-400 p-2">Status</th>
                    <th className="border border-slate-400 p-2">No. HP</th>
                    <th className="border border-slate-400 p-2">Tgl Daftar</th>
                  </tr>
                </thead>
                <tbody>
                  {db.map((user, index) => (
                    <tr key={user.id}>
                      <td className="border border-slate-400 p-2 text-center text-slate-800">{index + 1}</td>
                      <td className="border border-slate-400 p-2 font-mono text-slate-800">PMB-{user.id}</td>
                      <td className="border border-slate-400 p-2 uppercase text-slate-800 font-bold">{user.nama}</td>
                      <td className="border border-slate-400 p-2 text-slate-800">{user.nisn} / {user.nik}</td>
                      <td className="border border-slate-400 p-2 text-slate-800">{user.programStudi}</td>
                      <td className="border border-slate-400 p-2 text-slate-800">{user.statusPembayaran === 'Dikonfirmasi' ? 'Lunas' : (user.statusPembayaran || 'Belum Bayar')}</td>
                      <td className="border border-slate-400 p-2 text-slate-800">{user.noHp}</td>
                      <td className="border border-slate-400 p-2 text-slate-800">{user.tanggalDaftar}</td>
                    </tr>
                  ))}
                </tbody>
              </table>

              <div className="flex justify-end mt-12 pr-10">
                <div className="text-center text-slate-900">
                  <p>Mengetahui,</p>
                  <p className="mb-20">Panitia PMB</p>
                  <p className="font-bold underline">Hardi Hanto</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function FomoNotification({ db }) {
      const [isVisible, setIsVisible] = useState(false);
      const [fomoData, setFomoData] = useState({ name: '', prodi: '', time: '' });

      useEffect(() => {
        const baseNames = ["Andi dari Jakarta", "Siti dari Karawang", "Budi dari Bekasi", "Ayu dari Purwakarta", "Dimas dari Subang"];
        const baseProdis = ["S1 Teknik Informatika", "S1 Ilmu Hukum", "S1 Manajemen", "D3 Keperawatan", "S1 Ilmu Kesehatan Masyarakat"];
        const intervalId = setInterval(() => {
          setIsVisible(true);
          setTimeout(() => setIsVisible(false), 5000); 
        }, 15000); 
        return () => clearInterval(intervalId);
      }, []); 

      return (
        <div className={`fixed bottom-6 left-6 z-40 bg-white border-l-4 border-yellow-400 p-4 rounded-xl shadow-2xl flex items-center gap-4 max-w-sm transition-all duration-700 transform ${isVisible ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0 pointer-events-none'}`}>
          <div className="bg-red-100 p-2.5 rounded-full text-red-700">
            <i className="fa-solid fa-bell text-2xl animate-pulse"></i>
          </div>
          <div>
            <p className="text-xs text-slate-500 mb-0.5 font-medium">Baru saja</p>
            <p className="text-sm text-slate-800 leading-tight">Seseorang telah mendaftar di prodi <span className="text-red-700 font-semibold">USINDO</span></p>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
