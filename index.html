<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMB USINDO 2026/2027</title>
  
  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome Icons via CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- HTML2PDF via CDN (Sudah langsung diload di sini) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <!-- React & ReactDOM via CDN -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel standalone via CDN untuk merender JSX di dalam HTML -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Main Application Component
    function App() {
      const [currentView, setCurrentView] = useState('landing');
      const [isPdfReady, setIsPdfReady] = useState(false);
      const [db, setDb] = useState([]);
      const [currentUser, setCurrentUser] = useState(null);
      const [toast, setToast] = useState({ visible: false, message: '', type: 'info' });
      const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);

      const showToast = (message, type = 'info') => {
        setToast({ visible: true, message, type });
        setTimeout(() => setToast({ visible: false, message: '', type: 'info' }), 3000);
      };

      // Load Database from LocalStorage on mount
      useEffect(() => {
        const savedData = localStorage.getItem('pmb_database');
        if (savedData) {
          setDb(JSON.parse(savedData));
        }
        
        // Memastikan html2pdf dari CDN di <head> sudah ter-load
        if (window.html2pdf) {
            setIsPdfReady(true);
        } else {
            setTimeout(() => setIsPdfReady(true), 1500); // fallback jika loading agak lama
        }
      }, []);

      const saveToDb = (formData) => {
        const newUser = { ...formData, id: Date.now(), tanggalDaftar: new Date().toLocaleDateString('id-ID') };
        const newDb = [...db, newUser];
        setDb(newDb);
        localStorage.setItem('pmb_database', JSON.stringify(newDb));
        setCurrentUser(newUser);
        setCurrentView('success');
        showToast('Data Pendaftaran Berhasil Disimpan!', 'success');
        window.scrollTo(0, 0);
      };

      return (
        <div className="min-h-screen flex flex-col relative overflow-hidden">
          {/* Toast Notification */}
          <div className={`fixed top-20 right-4 z-50 transition-all duration-300 transform ${toast.visible ? 'translate-y-0 opacity-100' : '-translate-y-4 opacity-0 pointer-events-none'}`}>
            <div className={`flex items-center gap-3 px-4 py-3 rounded-lg shadow-xl text-white border ${toast.type === 'success' ? 'bg-green-600 border-green-700' : toast.type === 'error' ? 'bg-red-600 border-red-700' : 'bg-blue-600 border-blue-700'}`}>
              {toast.type === 'success' ? <i className="fa-solid fa-circle-check text-xl"></i> : <i className="fa-solid fa-circle-info text-xl"></i>}
              <span className="font-medium text-sm md:text-base">{toast.message}</span>
              <button onClick={() => setToast({ ...toast, visible: false })} className="ml-2 text-white/80 hover:text-white transition">
                <i className="fa-solid fa-xmark text-lg"></i>
              </button>
            </div>
          </div>

          {/* FOMO Notification */}
          <FomoNotification db={db} />

          {/* Navigation Bar */}
          <nav className="bg-red-700 text-white shadow-md sticky top-0 z-10 border-b-4 border-yellow-400">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between h-16 items-center">
                <div 
                  className="flex items-center gap-2 cursor-pointer" 
                  onClick={() => {setCurrentView('landing'); window.scrollTo(0,0);}}
                >
                  <i className="fa-solid fa-graduation-cap text-yellow-400 text-3xl"></i>
                  <span className="font-bold text-xl tracking-tight">PMB USINDO</span>
                </div>
                <div className="flex gap-2 sm:gap-4">
                  <button 
                    onClick={() => {setCurrentView('landing'); window.scrollTo(0,0);}}
                    className={`flex items-center gap-1 px-3 py-2 rounded-md transition-colors ${currentView === 'landing' ? 'bg-red-900' : 'hover:bg-red-800'}`}
                  >
                    <i className="fa-solid fa-house text-lg"></i> <span className="hidden sm:inline">Beranda</span>
                  </button>
                  <button 
                    onClick={() => {setCurrentView('form'); window.scrollTo(0,0);}}
                    className={`flex items-center gap-1 px-3 py-2 rounded-md transition-colors ${currentView === 'form' ? 'bg-red-900' : 'hover:bg-red-800'}`}
                  >
                    <i className="fa-solid fa-user-plus text-lg"></i> <span className="hidden sm:inline">Daftar</span>
                  </button>
                  <button 
                    onClick={() => {setCurrentView('admin'); window.scrollTo(0,0);}}
                    className={`flex items-center gap-1 px-3 py-2 rounded-md transition-colors ${currentView === 'admin' ? 'bg-red-900' : 'hover:bg-red-800'}`}
                  >
                    <i className="fa-solid fa-database text-lg"></i> <span className="hidden sm:inline">Admin</span>
                  </button>
                </div>
              </div>
            </div>
          </nav>

          {/* Main Content Area */}
          <main className="flex-grow flex flex-col">
            {currentView === 'landing' && <LandingPage setView={setCurrentView} />}
            {currentView === 'form' && <RegistrationForm submitForm={saveToDb} />}
            {currentView === 'success' && <SuccessPage user={currentUser} isPdfReady={isPdfReady} showToast={showToast} />}
            {currentView === 'admin' && (
              !isAdminLoggedIn ? (
                 <AdminLogin onLogin={() => setIsAdminLoggedIn(true)} showToast={showToast} />
              ) : (
                 <AdminDashboard db={db} isPdfReady={isPdfReady} showToast={showToast} onLogout={() => setIsAdminLoggedIn(false)} />
              )
            )}
          </main>

          {/* Footer */}
          <footer className="bg-slate-900 text-slate-300 py-10 border-t-4 border-yellow-400">
            <div className="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8 text-sm">
              <div>
                <h3 className="text-yellow-400 font-bold text-lg mb-4">Informasi & Pendaftaran</h3>
                <p className="flex items-center gap-2 mb-2"><i className="fa-solid fa-phone text-red-400 w-4"></i> Hubungi WhatsApp: <span className="font-bold text-white text-base">081929009212</span></p>
                <p className="flex items-center gap-2 mb-2"><i className="fa-solid fa-globe text-red-400 w-4"></i> www.usindo.ac.id</p>
                <p className="flex items-center gap-2 mb-2"><i className="fa-brands fa-instagram text-red-400 w-4 text-base"></i> @usindo.id</p>
                <p className="flex items-center gap-2"><i className="fa-brands fa-facebook text-red-400 w-4 text-base"></i> Universitas Sehati Indonesia</p>
              </div>
              <div>
                <h3 className="text-yellow-400 font-bold text-lg mb-4">Lokasi Kampus</h3>
                <div className="mb-4">
                  <p className="font-bold text-white flex items-center gap-2"><i className="fa-solid fa-location-dot text-red-400 w-4"></i> Kampus 1 USINDO</p>
                  <p className="text-slate-400 pl-6 leading-tight mt-1">Jl. Raya Kosambi - Telagasari Dusun Kawali,<br/>Pancawati, Kec. Klari, Karawang</p>
                </div>
                <div>
                  <p className="font-bold text-white flex items-center gap-2"><i className="fa-solid fa-location-dot text-red-400 w-4"></i> Kampus 2 USINDO</p>
                  <p className="text-slate-400 pl-6 leading-tight mt-1">Jl Raya Pangkal Perjuangan By Pass Karawang<br/>(200 Meter Dari SMKN 1 Karawang)</p>
                </div>
              </div>
              <div className="text-center md:text-right flex flex-col justify-center items-center md:items-end">
                <p className="mb-2">© 2026 Universitas Sehati Indonesia.</p>
                <div className="inline-block mt-2 p-4 border border-slate-700 rounded-lg bg-slate-800 text-center">
                  <p className="text-sm text-slate-400">Mengetahui,</p>
                  <p className="font-bold text-white text-lg mt-1">Hardi Hanto</p>
                  <p className="text-sm text-yellow-400">Panitia PMB</p>
                </div>
              </div>
            </div>
          </footer>
        </div>
      );
    }

    // 0. Admin Login Component
    function AdminLogin({ onLogin, showToast }) {
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (username === 'Admin!' && password === '@PMB#Usindo#1!') {
          onLogin();
          showToast('Login berhasil. Selamat datang Admin!', 'success');
        } else {
          showToast('Username atau password salah!', 'error');
        }
      };

      return (
        <div className="flex-grow flex items-center justify-center p-6 bg-slate-100">
          <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border-t-8 border-red-700">
            <div className="flex flex-col items-center mb-8">
              <div className="bg-red-100 p-4 rounded-full mb-4">
                <i className="fa-solid fa-lock text-red-700 text-4xl"></i>
              </div>
              <h2 className="text-2xl font-bold text-slate-800">Login Administrator</h2>
              <p className="text-slate-500 text-sm mt-1">Akses khusus panitia PMB USINDO</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-6">
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">Username</label>
                <input 
                  required 
                  type="text" 
                  value={username} 
                  onChange={(e) => setUsername(e.target.value)} 
                  className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" 
                  placeholder="Masukkan username" 
                />
              </div>
              <div>
                <label className="block text-sm font-medium text-slate-700 mb-2">Password</label>
                <input 
                  required 
                  type="password" 
                  value={password} 
                  onChange={(e) => setPassword(e.target.value)} 
                  className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" 
                  placeholder="Masukkan password" 
                />
              </div>
              <button 
                type="submit" 
                className="w-full bg-red-700 hover:bg-red-800 text-white font-bold py-3 px-4 rounded-lg shadow-md transition duration-200"
              >
                Masuk ke Dashboard
              </button>
            </form>
          </div>
        </div>
      );
    }

    // 1. Landing Page Component
    function LandingPage({ setView }) {
      return (
        <div className="flex-grow flex flex-col items-center p-6 bg-slate-50 w-full">
          {/* Hero Section */}
          <div className="w-full max-w-5xl text-center space-y-6 py-12">
            <div className="inline-block mb-2">
              <span className="bg-yellow-400 text-red-900 font-bold px-5 py-2 rounded-full text-sm md:text-base tracking-wide uppercase shadow-sm">
                "Lulusan USINDO Siap Kerja"
              </span>
            </div>
            <h1 className="text-5xl md:text-6xl font-extrabold text-red-700 tracking-tight leading-tight uppercase drop-shadow-sm">
              Universitas Sehati <br className="hidden md:block"/> Indonesia
            </h1>
            <h2 className="text-2xl md:text-3xl font-bold text-slate-800 italic">
              "Kuliah ? Usindo Aja !"
            </h2>
            
            <div className="w-full max-w-4xl mx-auto my-8 overflow-hidden rounded-2xl shadow-lg border-4 border-yellow-400 bg-white">
              <img 
                src="https://assyifateknologinusantara.com/wp-content/uploads/2026/05/usindo.jpeg" 
                alt="Kampus USINDO"

            </div>

            <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200 max-w-3xl mx-auto my-6">
              <p className="font-bold text-slate-800 text-sm md:text-base flex items-center justify-center gap-2 uppercase">
                <i className="fa-solid fa-award text-yellow-500 text-xl"></i> SK KEMENDIKBUDRISTEK NO 600/E/O/2023
              </p>
              <p className="text-slate-600 text-sm mt-2">
                Terakreditasi No. SK : 1403/SK/BAN-PT/AK.P/PT/VII/2024
              </p>
              <div className="mt-2 inline-block bg-green-100 text-green-800 px-3 py-1 rounded font-bold text-sm border border-green-200">
                Terakreditasi BAIK
              </div>
            </div>

            <div className="pt-4">
              <button 
                onClick={() => {setView('form'); window.scrollTo(0,0);}}
                className="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-full shadow-xl transform transition hover:-translate-y-1 hover:shadow-2xl flex items-center justify-center gap-3 mx-auto text-xl border-b-4 border-red-800"
              >
                <i className="fa-solid fa-file-lines text-2xl"></i>
                Daftar Sekarang
              </button>
            </div>
          </div>

          {/* Brosur Overlay */}
          <div className="w-full max-w-5xl py-8 px-4 mx-auto">
            <div className="overflow-hidden rounded-2xl shadow-lg border-2 border-slate-200 relative bg-white">
              <img 
                src="https://assyifateknologinusantara.com/wp-content/uploads/2026/05/PL-Usindo.jpeg" 
                alt="Brosur Pendaftaran USINDO" 
                className="w-full h-auto object-cover block"
              />
              <div className="absolute bottom-0 left-0 right-0 bg-red-900/95 text-white p-4 md:p-6 text-center border-t-4 border-yellow-400 backdrop-blur-sm">
                <p className="font-bold text-lg md:text-2xl uppercase flex items-center justify-center gap-2 drop-shadow-md">
                  <i className="fa-solid fa-phone text-yellow-400 text-2xl"></i>
                  Info Pembaruan Kontak PMB
                </p>
                <p className="text-sm md:text-lg mt-2 font-medium">
                  Mohon abaikan nomor yang tertera pada brosur di atas. <br className="hidden md:block"/>
                  Nomor WhatsApp resmi pendaftaran PMB USINDO adalah: 
                  <span className="block mt-1 font-extrabold text-yellow-400 text-2xl md:text-3xl tracking-widest drop-shadow-md">
                    081929009212
                  </span>
                </p>
              </div>
            </div>
          </div>

          {/* Faculties Section */}
          <div className="w-full max-w-6xl py-12">
            <h3 className="text-3xl font-bold text-center text-red-800 mb-10 uppercase tracking-wider drop-shadow-sm">Fakultas Yang Tersedia</h3>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
              <div className="bg-gradient-to-b from-yellow-50 to-yellow-100 rounded-2xl shadow-md border border-yellow-200 overflow-hidden transform transition hover:-translate-y-1">
                <div className="bg-yellow-400 p-6 text-center flex flex-col items-center justify-center">
                  <i className="fa-solid fa-heart-pulse text-red-800 text-5xl mb-3"></i>
                  <h4 className="font-bold text-xl text-red-900">Fakultas Ilmu Kesehatan</h4>
                </div>
                <ul className="p-6 space-y-4 font-semibold text-slate-800">
                  <li className="flex items-center gap-3"><i className="fa-solid fa-circle-check text-yellow-600 text-xl"></i> S1 Ilmu Kesehatan Masyarakat</li>
                  <li className="flex items-center gap-3"><i className="fa-solid fa-circle-check text-yellow-600 text-xl"></i> D3 Kebidanan</li>
                  <li className="flex items-center gap-3"><i className="fa-solid fa-circle-check text-yellow-600 text-xl"></i> D3 Keperawatan</li>
                </ul>
              </div>

              <div className="bg-gradient-to-b from-yellow-50 to-yellow-100 rounded-2xl shadow-md border border-yellow-200 overflow-hidden transform transition hover:-translate-y-1">
                <div className="bg-yellow-400 p-6 text-center flex flex-col items-center justify-center">
                  <i className="fa-solid fa-scale-balanced text-red-800 text-5xl mb-3"></i>
                  <h4 className="font-bold text-xl text-red-900">Fakultas Hukum & Ilmu Sosial</h4>
                </div>
                <ul className="p-6 space-y-4 font-semibold text-slate-800">
                  <li className="flex items-center gap-3"><i className="fa-solid fa-circle-check text-yellow-600 text-xl"></i> S1 Ilmu Hukum</li>
                  <li className="flex items-center gap-3"><i className="fa-solid fa-circle-check text-yellow-600 text-xl"></i> S1 Manajemen</li>
                  <li className="flex items-center gap-3"><i className="fa-solid fa-circle-check text-yellow-600 text-xl"></i> S1 Psikologi</li>
                  <li className="flex items-center gap-3"><i className="fa-solid fa-circle-check text-yellow-600 text-xl"></i> S1 PGSD</li>
                </ul>
              </div>

              <div className="bg-gradient-to-b from-yellow-50 to-yellow-100 rounded-2xl shadow-md border border-yellow-200 overflow-hidden transform transition hover:-translate-y-1">
                <div className="bg-yellow-400 p-6 text-center flex flex-col items-center justify-center">
                  <i className="fa-solid fa-desktop text-red-800 text-5xl mb-3"></i>
                  <h4 className="font-bold text-xl text-red-900">Fakultas Teknik</h4>
                </div>
                <ul className="p-6 space-y-4 font-semibold text-slate-800">
                  <li className="flex items-center gap-3"><i className="fa-solid fa-circle-check text-yellow-600 text-xl"></i> S1 Rekayasa Industri</li>
                  <li className="flex items-center gap-3"><i className="fa-solid fa-circle-check text-yellow-600 text-xl"></i> S1 Teknik Informatika</li>

          {/* Benefits Section */}

    // 2. Registration Form Component
    function RegistrationForm({ submitForm }) {
      const [formData, setFormData] = useState({
        nama: '', nisn: '', nik: '', tempatLahir: '', tanggalLahir: '',
        jenisKelamin: 'Laki-laki', agama: 'Islam', alamat: '',
        asalSekolah: '', jurusanSekolah: '', programStudi: 'S1 Teknik Informatika',
        noHp: '', email: ''
      });

      const handleChange = (e) => {
        setFormData({ ...formData, [e.target.name]: e.target.value });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        submitForm(formData);
      };

      return (
        <div className="max-w-4xl mx-auto w-full p-4 sm:p-6 lg:p-8 my-8">
          <div className="bg-white rounded-2xl shadow-xl overflow-hidden border-t-8 border-yellow-400">
            <div className="bg-red-700 p-6 text-white text-center">
              <h2 className="text-2xl font-bold">Formulir Pendaftaran Mahasiswa Baru</h2>
              <p className="text-red-100 mt-2">Lengkapi data diri Anda di bawah ini dengan benar.</p>
            </div>
            
            <form onSubmit={handleSubmit} className="p-6 sm:p-10 space-y-8">
              {/* Bagian Data Pribadi */}
              <div>
                <h3 className="text-lg font-semibold text-slate-800 border-b pb-2 mb-4">Data Pribadi</h3>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                  <div className="sm:col-span-2">
                    <label className="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap (Sesuai Ijazah)</label>
                    <input required type="text" name="nama" value={formData.nama} onChange={handleChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-500 focus:border-red-500 outline-none transition" placeholder="Contoh: Budi Santoso" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">NIK (Nomor Induk Kependudukan)</label>
                    <input required type="number" name="nik" value={formData.nik} onChange={handleChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" placeholder="16 digit NIK" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">NISN</label>
                    <input required type="number" name="nisn" value={formData.nisn} onChange={handleChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" placeholder="Nomor Induk Siswa Nasional" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Tempat Lahir</label>
                    <input required type="text" name="tempatLahir" value={formData.tempatLahir} onChange={handleChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" placeholder="Kota Kelahiran" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Tanggal Lahir</label>
                    <input required type="date" name="tanggalLahir" value={formData.tanggalLahir} onChange={handleChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none" />
                  </div>
                  <div>
                    <label className="block text-sm font-medium text-slate-700 mb-1">Jenis Kelamin</label>
                    <select name="jenisKelamin" value={formData.jenisKelamin} onChange={handleChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none bg-white">
                      <option value="Laki-laki">Laki-laki</option>
                      <option value="Perempuan">Perempuan</option>
                    </select>

    // 5. FOMO Notification Component
    function FomoNotification({ db }) {
      const [isVisible, setIsVisible] = useState(false);
      const [fomoData, setFomoData] = useState({ name: '', prodi: '', time: '' });

      useEffect(() => {
        const baseNames = ["Andi dari Jakarta", "Siti dari Karawang", "Budi dari Bekasi", "Ayu dari Purwakarta", "Dimas dari Subang", "Rina dari Bandung"];
        const baseProdis = ["S1 Teknik Informatika", "S1 Ilmu Hukum", "S1 Manajemen", "D3 Keperawatan", "S1 Ilmu Kesehatan Masyarakat"];
        
        const dbNames = db.map(user => user.nama + " (Pendaftar Baru)");
        const dbProdis = db.map(user => user.programStudi);

        const allNames = dbNames.length > 0 ? [...dbNames, ...baseNames] : baseNames;
        const allProdis = dbProdis.length > 0 ? [...dbProdis, ...baseProdis] : baseProdis;
        const times = ["Baru saja", "1 menit yang lalu", "2 menit yang lalu", "Beberapa detik yang lalu"];

        const intervalId = setInterval(() => {
          const useRealData = db.length > 0 && Math.random() > 0.4;
          
          let selectedName, selectedProdi;
          if (useRealData) {
             const randomDbIndex = Math.floor(Math.random() * db.length);
             selectedName = db[randomDbIndex].nama;
             selectedProdi = db[randomDbIndex].programStudi;
          } else {
             selectedName = allNames[Math.floor(Math.random() * allNames.length)];
             selectedProdi = allProdis[Math.floor(Math.random() * allProdis.length)];
          }

          setFomoData({
            name: selectedName,
            prodi: selectedProdi,
            time: times[Math.floor(Math.random() * times.length)]
          });
          setIsVisible(true);
          
          setTimeout(() => {
            setIsVisible(false);
          }, 5000); 
        }, 15000); 

        const initialTimeout = setTimeout(() => {
          const initialName = db.length > 0 ? db[db.length - 1].nama : baseNames[0];
          const initialProdi = db.length > 0 ? db[db.length - 1].programStudi : baseProdis[0];
          setFomoData({
            name: initialName,
            prodi: initialProdi,
            time: "Baru saja"
          });
          setIsVisible(true);
          setTimeout(() => setIsVisible(false), 5000);
        }, 3000);

        return () => {
          clearInterval(intervalId);
          clearTimeout(initialTimeout);
        };
      }, [db]); 

      return (
        <div className={`fixed bottom-6 left-6 z-40 bg-white border-l-4 border-yellow-400 p-4 rounded-xl shadow-2xl flex items-center gap-4 max-w-sm transition-all duration-700 transform ${isVisible ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0 pointer-events-none'}`}>
          <div className="bg-red-100 p-2.5 rounded-full text-red-700">
            <i className="fa-solid fa-bell text-2xl animate-pulse"></i>
          </div>
          <div>
            <p className="text-xs text-slate-500 mb-0.5 font-medium">{fomoData.time}</p>
            <p className="text-sm text-slate-800 leading-tight">
              <span className="font-bold">{fomoData.name}</span> telah mendaftar di prodi <br/>
              <span className="text-red-700 font-semibold">{fomoData.prodi}</span>
            </p>
          </div>
        </div>
      );
    }

    // Initialize React App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
